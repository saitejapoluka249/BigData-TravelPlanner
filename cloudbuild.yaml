steps:
  # 1. Build the Backend
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--platform"
      - "linux/amd64"
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/travel-app/backend:latest"
      - "-f"
      - "backend/Dockerfile"
      - "./backend"

  # 2. Push the Backend
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/travel-app/backend:latest"

  # 3. Build the Frontend (Injecting the backend URL)
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--platform"
      - "linux/amd64"
      - "--build-arg"
      - "NEXT_PUBLIC_API_URL=https://prod-travel-backend-q575tyursq-uc.a.run.app/api/v1"
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/travel-app/frontend:latest"
      - "-f"
      - "frontend/Dockerfile"
      - "./frontend"

  # 4. Push the Frontend
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/travel-app/frontend:latest"

  # 5. Update Cloud Run Backend
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "services"
      - "update"
      - "prod-travel-backend"
      - "--region"
      - "us-central1"
      - "--image"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/travel-app/backend:latest"

  # 6. Update Cloud Run Frontend
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "services"
      - "update"
      - "prod-travel-frontend"
      - "--region"
      - "us-central1"
      - "--image"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/travel-app/frontend:latest"

images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/travel-app/backend:latest"
  - "us-central1-docker.pkg.dev/$PROJECT_ID/travel-app/frontend:latest"

# ADD THESE LINES AT THE BOTTOM:
options:
  logging: CLOUD_LOGGING_ONLY
