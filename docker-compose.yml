services:
  backend:
    build: # Explicitly enters backend folder and finds Dockerfile for spin up
      context: ./backend
      dockerfile: Dockerfile
    container_name: travel-backend
    env_file:
      - ./backend/.env  # Goes into backend directory and accesses env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - REDIS_URL=redis://redis:6379
    networks:
      - travel-app-network
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_started

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: travel-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - travel-app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    container_name: travel-redis
    ports:
      - "6379:6379"
    networks:
      - travel-app-network
    restart: unless-stopped

  frontend: 
    depends_on:
      backend:
        condition: service_started # Waits for backend to spin up before spinning up frontend
    build: # Explicitly enters backend folder and finds Dockerfile for spin up
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travel-frontend
    env_file:
      - ./frontend/.env.local # Goes to frontend directory and loads env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      - BACKEND_URL=${BACKEND_URL:-http://travel-backend:8000/api/v1}
    networks:
      - travel-app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  travel-app-network:
    driver: bridge

volumes:
  es_data:
    driver: local
  frontend_node_modules:
    driver: local