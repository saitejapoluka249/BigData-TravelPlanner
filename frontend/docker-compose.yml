version: '3.8'

services:
  frontend: 
    build: .
    container_name: travel-frontend
    env_file:
      - .env.local # 🌟 Loads the Next.js env file
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      - BACKEND_URL=${BACKEND_URL:-http://travel-backend:8000/api/v1}
    networks:
      - travel-app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  travel-app-network:
    external: true

volumes:
  frontend_node_modules:
    driver: local