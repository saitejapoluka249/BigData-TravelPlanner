name: pytest-smoke-suite
on: # Trigger the workflow on push or pull request to the specified branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allow manual triggering of the workflow from GitHub Actions tab

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # Can find these versions on GitHub Marketplace

      - name: Start Services with Docker Compose
        run: |
          docker compose up -d redis elasticsearch --wait
        working-directory: ./backend

      - name: Run Smoke Tests in Docker
        run: |
          docker compose run --rm \
            -e POSTGRES_URL="sqlite:////app/test.db" \
            -e SECRET_KEY="test_secret_key" \
            -e AMADEUS_CLIENT_ID="test_amadeus_client_id" \
            -e AMADEUS_CLIENT_SECRET="test_amadeus_client_secret" \
            -e WEATHER_API_KEY="test_weather_api_key" \
            -e BDC_API_KEY="test" \
            -e DUFFEL_API_KEY="test" \
            -e BACKEND_CORS_ORIGINS="http://localhost:3000" \
            -e ELASTICSEARCH_URL=http://elasticsearch:9200 \
            -e REDIS_URL=redis://redis:6379 \
            backend python -m pytest -m smoke tests
        working-directory: ./backend

      - name: Cleanup Containers
        if: always() # Ensure cleanup runs even if tests fail
        run: docker compose down -v
